<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./src/styles/hud.css" />
    <link rel="stylesheet" href="./src/styles/responsivity.css" />
    <link rel="stylesheet" href="./src/styles/social.css" />

    <title>Bob | 3D VR</title>
  </head>
  <body>
    <div class="box hud" id="hud-panel">
      <button class="hud-toggle" id="hud-toggle">⮜</button>

      <div class="hud-content">
        <p>
          Hello visitor. <br />
          To inspect the scene press: <br />
          <kbd>Ctrl</kbd> + <kbd>Alt</kbd> + <kbd>I</kbd>
        </p>

        <p>
          Use <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move
          around.
        </p>

        <p>Click on <strong>Bob</strong> in the scene to interact.</p>

        <p>
          Drag the mouse to look around. <br />
          On mobile, move your phone to explore the scene.
        </p>

        <p>Toggle this panel with <kbd>H</kbd></p>
      </div>

      <div class="hud-label">INFO</div>
    </div>

    <a
      href="https://github.com/Talyslan"
      class="github-link"
      rel="noopener noreferrer"
      target="_blank"
    >
      <img
        src="/social/github.svg"
        alt="Creators Github Link"
        width="82"
        height="82"
      />
    </a>

    <a-scene>
      <a-entity position="0 0.3 -2">
        <a-plane width="0.8" height="0.3" color="#F5704E"></a-plane>
        <a-text value="VR Project" align="center" width="2"></a-text>
      </a-entity>

      <a-entity
        geometry="primitive: sphere; radius: 0.3"
        material="color: #F5704E"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000"
        position="2 0.5 -3"
      ></a-entity>

      <a-entity
        geometry="primitive: sphere; radius: 0.3"
        material="color: #F5704E"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000"
        position="-2 0.5 -3"
      ></a-entity>

      <a-text
        value="Bob"
        font="https://cdn.aframe.io/fonts/KelsonSans.fnt"
        position="0 2.8 -2.5"
        align="center"
        color="#F5704E"
        width="8"
        scale="1.5 1.5 1.5"
        letter-spacing="2"
        opacity="0.9"
      >
        ></a-text
      >

      <a-entity
        id="magic"
        gltf-model="/models/bob-3d.glb"
        scale="1 1 1"
        position="0 0.5 -2.5"
        auto-rotate
        floating
        interaction
        event-set__enter="_event: mouseenter; scale: 1.2 1.2 1.2"
        event-set__leave="_event: mouseleave; scale: 1 1 1"
      ></a-entity>

      <a-entity
        position="0 0.5 -2.5"
        particle-system="preset: dust; velocity: 2 3 5; acceleration: 3 1 4;  minParticles: 100;  maxParticles: 500; color: #F5704E;"
      ></a-entity>

      <a-sky
        color="#000"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 120000"
      ></a-sky>

      <a-entity
        environment="preset: yavapai; groundColor: #F5704E; skyColor: #87CEEB; skyType: atmosphere; shadow: true; shadowIntensity: 1; shadowSoftness: 0.5; fog: 0.6; fogColor: #F5704E; fogNear: 0.5; fogFar: 1.5;"
      ></a-entity>

      <a-camera
        position="0 1.6 0"
        camera="active: true"
        look-controls
        wasd-controls
      >
        <a-cursor color="#000"></a-cursor>

        <a-text
          value="Dev Tip\nPress Ctrl + Alt + I\nExplore the code"
          align="center"
          color="#F5704E"
          width="1.8"
          position="0 0 0.01"
        ></a-text>
      </a-camera>
    </a-scene>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
