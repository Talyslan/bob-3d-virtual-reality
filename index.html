<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bob | 3D VR</title>
  </head>
  <body>
    <a-scene>
      <a-entity
        gltf-model="/models/bob-3d.glb"
        scale="1 1 1"
        position="0 0.5 -2.5"
        auto-rotate
        floating
      ></a-entity>

      <a-camera
        position="0 1.6 0"
        camera="active: true"
        look-controls
        wasd-controls
      >
        <a-cursor color="#000"></a-cursor>
      </a-camera>

      <a-entity
        position="0 0 0"
        particle-system="preset: dust; velocity: 2 3 5; acceleration: 3 1 4;  minParticles: 100;  maxParticles: 500; color: #F5704E";
      ></a-entity>

      <a-entity
        environment="preset: yavapai; groundColor: #F5704E; skyColor: #87CEEB; skyType: atmosphere; shadow: true; shadowIntensity: 1; shadowSoftness: 0.5; fog: 0.6; fogColor: #F5704E; fogNear: 0.5; fogFar: 1.5;"
      ></a-entity>
    </a-scene>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
